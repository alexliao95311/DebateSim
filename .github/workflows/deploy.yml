name: Deploy to DigitalOcean VM

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 30s
          command_timeout: 1m
          script: |
            echo "🔍 Testing SSH connection..."
            echo "Hostname: $(hostname)"
            echo "Current user: $(whoami)"
            echo "Current directory: $(pwd)"
            echo "✅ SSH connection successful"

      - name: Update Code
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 3m
          script: |
            set -e
            echo "🚀 Updating code..."
            cd /home/${{ secrets.VM_USER }}/DebateSim
            git pull origin main
            echo "✅ Code updated successfully"

      - name: Restart Backend
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 2m
          script: |
            set -e
            echo "🔄 Restarting Backend..."
            cd /home/${{ secrets.VM_USER }}/DebateSim
            
            # Kill existing backend process using PID file
            echo "Stopping existing backend..."
            if [ -f "backend.pid" ]; then
              if kill $(cat backend.pid) 2>/dev/null; then
                echo "Backend process stopped"
              else
                echo "Backend PID file exists but process not running"
              fi
              rm -f backend.pid
            else
              echo "No backend PID file found"
            fi
            
            # Check if venv exists and activate
            if [ ! -f "venv/bin/activate" ]; then
              echo "❌ Virtual environment not found"
              exit 1
            fi
            
            echo "Activating virtual environment..."
            source venv/bin/activate
            
            echo "Starting backend server..."
            # Start backend server in background and save PID
            nohup uvicorn main:app --host 0.0.0.0 --port 5000 --reload > backend.log 2>&1 &
            echo $! > backend.pid
            
            # Wait and check if process started
            sleep 5
            
            if pgrep -f "uvicorn main:app" > /dev/null; then
              echo "✅ Backend started successfully"
              # Test backend is responding
              if curl -f -s http://localhost:5000/docs > /dev/null; then
                echo "✅ Backend is responding to requests"
              else
                echo "⚠️  Backend process running but not responding"
              fi
            else
              echo "❌ Backend failed to start"
              echo "Backend logs:"
              cat backend.log || echo "No backend logs available"
              exit 1
            fi

      - name: Build Frontend
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 8m
          script: |
            set -e
            echo "🛠 Building Frontend..."
            cd /home/${{ secrets.VM_USER }}/DebateSim/frontend
            
            # Kill existing frontend process using PID file
            echo "Stopping existing frontend..."
            if [ -f "frontend.pid" ]; then
              if kill $(cat frontend.pid) 2>/dev/null; then
                echo "Frontend process stopped"
              else
                echo "Frontend PID file exists but process not running"
              fi
              rm -f frontend.pid
            else
              echo "No frontend PID file found"
            fi
            
            echo "📦 Installing dependencies..."
            npm install
            
            echo "🔨 Building frontend..."
            export VITE_API_URL=https://debatesim.us
            npm run build
            echo "✅ Frontend built successfully"

      - name: Deploy Frontend with Caddy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 3m
          script: |
            set -e
            echo "🌐 Deploying frontend with Caddy..."
            cd /home/${{ secrets.VM_USER }}/DebateSim
            
            # Stop any running frontend development server
            if [ -f "frontend/frontend.pid" ]; then
              if kill $(cat frontend/frontend.pid) 2>/dev/null; then
                echo "Frontend development server stopped"
              fi
              rm -f frontend/frontend.pid
            fi
            
            # Ensure frontend build exists
            if [ ! -d "frontend/dist" ]; then
              echo "❌ Frontend dist directory not found. Build may have failed."
              exit 1
            fi
            
            # Symlink built assets for Caddy to serve
            echo "Updating web root symlink..."
            sudo mkdir -p /var/www
            sudo ln -sfn /home/${{ secrets.VM_USER }}/DebateSim/frontend/dist /var/www/debatesim
            
            # Deploy and reload Caddy
            echo "Deploying Caddyfile..."
            sudo cp deploy/Caddyfile /etc/caddy/Caddyfile
            
            echo "Validating Caddy configuration..."
            sudo caddy validate --config /etc/caddy/Caddyfile
            
            echo "Reloading Caddy..."
            sudo systemctl reload caddy
            
            # Verify Caddy is running
            if sudo systemctl is-active --quiet caddy; then
              echo "✅ Caddy is running and serving frontend on ports 80/443"
            else
              echo "❌ Caddy is not running"
              sudo systemctl status caddy
              exit 1
            fi
            
            echo "🎉 Deployment completed successfully!"
            echo "Backend: http://${{ secrets.VM_HOST }}:5000"
            echo "Frontend: https://debatesim.us (http://${{ secrets.VM_HOST }})"